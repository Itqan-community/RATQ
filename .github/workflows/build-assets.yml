name: Build Assets

on:
  push:
    branches: [ main, arabic ]
    paths:
      - 'content/**'
      - 'docs/**'
      - 'scripts/**'
      - '.github/workflows/build-assets.yml'
  workflow_dispatch:

jobs:
  build-assets:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
          
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest

      - name: Run Tests
        run: |
          pytest tests/test_generate_search_index.py

      - name: Generate files
        run: |
          python scripts/generate_search_index.py
          
      - name: Validate Output JSON
        run: |
          python -c "import json; json.load(open('manifest.json'))"
          python -c "import json; json.load(open('search-index.json'))"
      
      - name: Commit changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add -f manifest.json search-index.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto-update assets (manifest and search index)"
            git push
          fi

