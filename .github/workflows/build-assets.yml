name: Build Assets

on:
  push:
    branches: [ main, arabic ]
    paths-ignore:
      - 'manifest.json'
      - 'search-index.json'
  workflow_dispatch:

concurrency:
  group: build-assets-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-assets:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.12'

      - name: Generate manifest and search index
        run: |
          python scripts/generate_manifest.py
          python scripts/generate_search_index.py

      - name: Validate generated JSON
        run: |
          python -m json.tool manifest.json > /dev/null
          python -m json.tool search-index.json > /dev/null

      - name: Commit changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add -f manifest.json search-index.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto-update assets (manifest and search index)"
            git push
          fi

